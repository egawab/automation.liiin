<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexora Extension</title>
  <style>
    :root {
      /* Apple Light Theme (Default) */
      --bg-base: #f5f5f7;
      --bg-surface: #ffffff;
      --bg-surface-hover: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.08);
      --text-primary: #1d1d1f;
      --text-secondary: rgba(0,0,0,0.56);
      --accent: #0071e3;
      --success: #34c759;
      --danger: #ff3b30;
      --warning: #ff9f0a;
      --glass-bg: rgba(255,255,255,0.8);
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        /* Apple Dark Theme */
        --bg-base: #000000;
        --bg-surface: #1d1d1f;
        --bg-surface-hover: rgba(255,255,255,0.06);
        --border: rgba(255,255,255,0.05);
        --text-primary: #ffffff;
        --text-secondary: rgba(255,255,255,0.48);
        --glass-bg: rgba(0,0,0,0.8);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      width: 360px;
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Universal ── */
    .hidden { display: none !important; }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-surface-hover); }

    .btn-success { background: var(--success); color: white; }
    .btn-success:hover:not(:disabled) { opacity: 0.9; }

    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover:not(:disabled) { opacity: 0.9; }

    /* ── Header ── */
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--glass-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.01em;
    }
    .badge-pro {
      background: var(--accent);
      color: white;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #disconnectBtn {
      width: auto !important;
      padding: 4px 8px !important;
      font-size: 11px !important;
      border-radius: 6px !important;
      opacity: 0.7;
    }
    #disconnectBtn:hover { opacity: 1; }

    /* ── Views ── */
    .view { padding: 16px 20px 20px; }

    /* ── SETUP VIEW ── */
    #setupView .card {
      background: var(--bg-surface);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
    }
    #setupView h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    #setupView p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }

    #autoConnectBtn { margin-bottom: 12px; }

    .divider { text-align: center; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; margin: 16px 0; }

    label { font-size: 10px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--bg-surface-hover);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-secondary); opacity: 0.7; }

    #setupMsg { text-align: center; font-size: 11px; font-weight: 600; min-height: 16px; color: var(--text-secondary); margin-top: 4px; }

    /* ── DASHBOARD VIEW ── */
    .glass-card {
      background: var(--bg-surface);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    /* Status Card */
    .status-card { text-align: center; padding: 20px 16px; position: relative; }
    .status-indicator {
      width: 44px; height: 44px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .status-indicator .ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--border); }
    .status-indicator .ring-fill { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--accent); }
    .status-indicator.active .ring-fill { animation: spin 1s linear infinite; border-top-color: var(--success); border-right-color: var(--success); }
    .status-indicator.paused .ring { border-color: rgba(255,59,48,0.2); }
    .status-indicator.paused .ring-fill { border-top-color: var(--danger); animation: none; }
    .status-indicator.resting .ring-fill { border-top-color: var(--warning); animation: spin 3s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-icon { font-size: 16px; z-index: 1; }
    .status-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .status-sub { font-size: 11px; color: var(--text-secondary); }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat-box { background: var(--bg-surface); border-radius: 10px; padding: 12px; border: 1px solid var(--border); text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
    .stat-label { font-size: 9px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Keyword Box */
    .keyword-box { background: var(--bg-surface-hover); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; text-align: center; margin-bottom: 14px; }
    .keyword-label { font-size: 9px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .keyword-text { font-size: 12px; font-weight: 600; color: var(--accent); }

    /* Play/Pause */
    #playPauseBtn { font-size: 12px; padding: 12px; }
    #actionMsg { text-align: center; font-size: 11px; font-weight: 600; margin-top: 8px; color: var(--text-secondary); min-height: 16px; }

    /* ── Activity Log ── */
    .activity-section { margin-top: 12px; }
    .activity-header { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .activity-dot { width: 4px; height: 4px; background: var(--success); border-radius: 50%; }

    .activity-log { background: var(--bg-surface-hover); border-radius: 8px; border: 1px solid var(--border); padding: 4px 0; max-height: 140px; overflow-y: auto; }
    .activity-log::-webkit-scrollbar { width: 3px; }
    .activity-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-entry { padding: 6px 12px; display: flex; align-items: flex-start; gap: 8px; font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
    .log-entry:first-child { color: var(--text-primary); font-weight: 600; }
    .log-entry .log-time { font-size: 9px; color: var(--text-secondary); min-width: 38px; padding-top: 1px; }
    .log-entry .log-text { flex: 1; word-break: break-word; }

    .log-empty { padding: 16px; text-align: center; font-size: 11px; color: var(--text-secondary); }

    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Footer ── */
    footer { text-align: center; padding: 12px 20px; font-size: 10px; color: var(--text-secondary); border-top: 1px solid var(--border); }
    footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent);">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
      </svg>
      Nexora <span class="badge-pro">Pro</span>
    </h1>
    <button id="disconnectBtn" class="btn btn-ghost hidden">Disconnect</button>
  </header>

  <!-- ==================== SETUP VIEW ==================== -->
  <div id="setupView" class="view">
    <div class="card">
      <h3>Welcome</h3>
      <p>Connect your browser to the Nexora Dashboard to unleash the automation engine.</p>
      
      <button id="autoConnectBtn" class="btn btn-primary">Auto-Connect</button>
      <div id="setupMsg"></div>

      <div class="divider">or manual setup</div>

      <label>Dashboard URL</label>
      <input type="text" id="dashboardUrl" placeholder="https://example.vercel.app">
      
      <label>User ID</label>
      <input type="text" id="userId" placeholder="67baea48-...">
      
      <button id="saveBtn" class="btn btn-ghost">Save & Connect</button>
    </div>
  </div>

  <!-- ==================== DASHBOARD VIEW ==================== -->
  <div id="dashboardView" class="view hidden fade-in">
    
    <!-- Status Card -->
    <div class="glass-card status-card" id="statusCard">
      <div class="status-indicator" id="statusIndicator">
        <div class="ring"></div>
        <div class="ring-fill"></div>
        <span class="status-icon" id="statusIcon">⏸</span>
      </div>
      <div class="status-title" id="statusTitle">Engine Paused</div>
      <div class="status-sub" id="statusSub">Ready to automate your engagement</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="countComments">0/15</div>
        <div class="stat-label">Comments</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="countCycles">0/3</div>
        <div class="stat-label">Cycles</div>
      </div>
    </div>

    <!-- Keyword -->
    <div class="keyword-box" id="keywordBox">
      <div class="keyword-label">Targeting</div>
      <div class="keyword-text" id="currentKeyword">Waiting for engine...</div>
    </div>

    <!-- Engine Button -->
    <button id="playPauseBtn" class="btn btn-success">START ENGINE</button>
    <div id="actionMsg"></div>

    <!-- Activity Log -->
    <div class="activity-section">
      <div class="activity-header">
        <div class="activity-dot"></div>
        Activity Feed
      </div>
      <div class="activity-log" id="activityLog">
        <div class="log-empty">No activity yet</div>
      </div>
    </div>

  </div>

  <footer>
    Need help? <a href="#" id="openDashboardBtn">Open Full Dashboard</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
