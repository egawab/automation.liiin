<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexora Extension</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg-deep: #0b0f1a;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(6,182,212,0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent: #06b6d4;
      --accent-glow: rgba(6,182,212,0.15);
      --success: #10b981;
      --success-glow: rgba(16,185,129,0.15);
      --warning: #f59e0b;
      --warning-glow: rgba(245,158,11,0.15);
      --danger: #ef4444;
      --danger-glow: rgba(239,68,68,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 360px;
      background: var(--bg-deep);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Universal ── */
    .hidden { display: none !important; }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.02em;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #0891b2);
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(6,182,212,0.3); transform: translateY(-1px); }

    .btn-ghost {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      backdrop-filter: blur(8px);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-card-hover); color: var(--text-primary); }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #059669);
      color: white;
      box-shadow: 0 4px 15px var(--success-glow);
    }
    .btn-success:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(16,185,129,0.3); transform: translateY(-1px); }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      color: white;
      box-shadow: 0 4px 15px var(--danger-glow);
    }
    .btn-danger:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(239,68,68,0.25); }

    /* ── Header ── */
    header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(11,15,26,0.8);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 16px;
      font-weight: 900;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.02em;
    }
    .badge-pro {
      background: linear-gradient(135deg, var(--accent), #0891b2);
      color: white;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    #disconnectBtn {
      width: auto !important;
      padding: 5px 10px !important;
      font-size: 10px !important;
      border-radius: 6px !important;
      opacity: 0.6;
    }
    #disconnectBtn:hover { opacity: 1; }

    /* ── Views ── */
    .view { padding: 16px 20px 20px; }

    /* ── SETUP VIEW ── */
    #setupView .card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    #setupView h3 {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    #setupView p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    #autoConnectBtn {
      background: linear-gradient(135deg, var(--accent), #0891b2);
      color: white;
      font-size: 14px;
      padding: 14px;
      box-shadow: 0 4px 20px var(--accent-glow);
      margin-bottom: 12px;
    }
    #autoConnectBtn:hover { box-shadow: 0 8px 30px rgba(6,182,212,0.35); transform: translateY(-1px); }

    .divider {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin: 18px 0;
    }

    label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder { color: var(--text-muted); }

    #setupMsg {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      min-height: 18px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── DASHBOARD VIEW ── */
    .glass-card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 16px;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      margin-bottom: 12px;
    }

    /* Status Card */
    .status-card {
      text-align: center;
      padding: 20px 16px;
      position: relative;
      overflow: hidden;
    }
    .status-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status-card.active::before { opacity: 1; }

    .status-indicator {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .status-indicator .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid var(--border);
    }
    .status-indicator .ring-fill {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: var(--accent);
    }
    .status-indicator.active .ring-fill {
      animation: spin 1.2s linear infinite;
      border-top-color: var(--success);
      border-right-color: var(--success);
    }
    .status-indicator.paused .ring { border-color: var(--danger-glow); }
    .status-indicator.paused .ring-fill { border-top-color: var(--danger); animation: none; }
    .status-indicator.resting .ring-fill {
      border-top-color: var(--warning);
      animation: spin 3s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-icon {
      font-size: 18px;
      z-index: 1;
    }

    .status-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .status-sub {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-box {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Keyword Box */
    .keyword-box {
      background: var(--accent-glow);
      border: 1px solid rgba(6,182,212,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      margin-bottom: 14px;
    }
    .keyword-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .keyword-text { font-size: 13px; font-weight: 700; color: var(--accent); }

    /* Play/Pause */
    #playPauseBtn { font-size: 13px; padding: 14px; letter-spacing: 0.04em; }

    #actionMsg { text-align: center; font-size: 11px; font-weight: 600; margin-top: 10px; color: var(--text-muted); min-height: 16px; }

    /* ── Activity Log ── */
    .activity-section {
      margin-top: 12px;
    }
    .activity-header {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .activity-dot {
      width: 5px;
      height: 5px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .activity-log {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 6px 0;
      max-height: 160px;
      overflow-y: auto;
    }
    .activity-log::-webkit-scrollbar { width: 3px; }
    .activity-log::-webkit-scrollbar-track { background: transparent; }
    .activity-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-entry {
      padding: 6px 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 11px;
      color: var(--text-secondary);
      transition: background 0.15s;
      line-height: 1.4;
    }
    .log-entry:hover { background: rgba(255,255,255,0.02); }
    .log-entry:first-child {
      color: var(--text-primary);
      font-weight: 600;
    }
    .log-entry .log-time {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      min-width: 38px;
      padding-top: 1px;
      font-variant-numeric: tabular-nums;
    }
    .log-entry .log-text {
      flex: 1;
      word-break: break-word;
    }

    .log-empty {
      padding: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Animations ── */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .flash {
      animation: flash 0.3s ease;
    }
    @keyframes flash {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 12px 20px;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; font-weight: 600; cursor: pointer; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--accent);">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
      </svg>
      Nexora <span class="badge-pro">Pro</span>
    </h1>
    <button id="disconnectBtn" class="btn btn-ghost hidden">Disconnect</button>
  </header>

  <!-- ==================== SETUP VIEW ==================== -->
  <div id="setupView" class="view">
    <div class="card">
      <h3>Welcome to Nexora</h3>
      <p>Connect your browser to the Nexora Dashboard to unleash the automation engine.</p>
      
      <button id="autoConnectBtn" class="btn btn-primary">🔗 Auto-Connect</button>
      <div id="setupMsg"></div>

      <div class="divider">or manual setup</div>

      <label>Dashboard URL</label>
      <input type="text" id="dashboardUrl" placeholder="https://your-app.vercel.app">
      
      <label>User ID</label>
      <input type="text" id="userId" placeholder="67baea48-...">
      
      <button id="saveBtn" class="btn btn-ghost">Save & Connect</button>
    </div>
  </div>

  <!-- ==================== DASHBOARD VIEW ==================== -->
  <div id="dashboardView" class="view hidden fade-in">
    
    <!-- Status Card -->
    <div class="glass-card status-card" id="statusCard">
      <div class="status-indicator" id="statusIndicator">
        <div class="ring"></div>
        <div class="ring-fill"></div>
        <span class="status-icon" id="statusIcon">⏸</span>
      </div>
      <div class="status-title" id="statusTitle">Engine Paused</div>
      <div class="status-sub" id="statusSub">Ready to automate your engagement</div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="countComments">0/15</div>
        <div class="stat-label">Comments</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="countCycles">0/3</div>
        <div class="stat-label">Cycles</div>
      </div>
    </div>

    <!-- Keyword -->
    <div class="keyword-box" id="keywordBox">
      <div class="keyword-label">🎯 Targeting</div>
      <div class="keyword-text" id="currentKeyword">Waiting for engine...</div>
    </div>

    <!-- Engine Button -->
    <button id="playPauseBtn" class="btn btn-success">▶ START ENGINE</button>
    <div id="actionMsg"></div>

    <!-- Activity Log -->
    <div class="activity-section">
      <div class="activity-header">
        <div class="activity-dot"></div>
        Activity Feed
      </div>
      <div class="activity-log" id="activityLog">
        <div class="log-empty">No activity yet</div>
      </div>
    </div>

  </div>

  <footer>
    Need help? <a href="#" id="openDashboardBtn">Open Full Dashboard</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
