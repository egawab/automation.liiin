<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexora Extension</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 340px;
      padding: 0;
      margin: 0;
      color: #1f2937;
      background: #f3f4f6;
    }
    
    * { box-sizing: border-box; }

    /* Universal Classes */
    .hidden { display: none !important; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .btn-primary { background: #0077b5; color: white; }
    .btn-primary:hover { background: #006097; }
    
    .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #4b5563; }
    .btn-outline:hover { background: #f9fafb; }
    
    .btn-success { background: #10b981; color: white; }
    .btn-success:hover { background: #059669; }
    
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }

    /* Header */
    header {
      background: white;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge-pro {
      background: #e0f2fe;
      color: #0284c7;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    /* Views */
    .view { padding: 20px; }

    /* --- SETUP VIEW --- */
    #setupView .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
      margin-bottom: 20px;
    }
    #autoConnectBtn {
      background: linear-gradient(135deg, #0077b5, #00a0dc);
      color: white;
      font-size: 15px;
      padding: 14px;
      box-shadow: 0 4px 12px rgba(0,119,181,0.3);
      margin-bottom: 16px;
    }
    #autoConnectBtn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,119,181,0.4); }
    
    .divider {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 20px 0;
      position: relative;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }
    label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
    
    /* --- DASHBOARD VIEW --- */
    .status-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
      border: 1px solid #f3f4f6;
      text-align: center;
      margin-bottom: 16px;
    }
    
    .pulse-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    .pulse-green { background: #10b981; box-shadow: 0 0 0 4px rgba(16,185,129,0.2); animation: pulse 2s infinite; }
    .pulse-red { background: #ef4444; }
    .pulse-orange { background: #f59e0b; box-shadow: 0 0 0 4px rgba(245,158,11,0.2); animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }

    .status-text { font-size: 15px; font-weight: 800; color: #111827; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .status-sub { font-size: 12px; color: #6b7280; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: white;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e5e7eb;
    }
    .stat-value { font-size: 24px; font-weight: 900; color: #0077b5; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; }

    .keyword-box {
      background: #eff6ff;
      border: 1px dashed #bfdbfe;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      margin-bottom: 20px;
    }
    .keyword-text { font-size: 13px; font-weight: 700; color: #1d4ed8; }

    #playPauseBtn { font-size: 16px; padding: 16px; }

    /* Footer */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
    footer a { color: #0077b5; text-decoration: none; font-weight: 600; cursor: pointer; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>🚀 Nexora <span class="badge-pro">Pro</span></h1>
    <button id="disconnectBtn" class="btn btn-outline hidden" style="width: auto; padding: 6px 10px; font-size: 11px;">Disconnect</button>
  </header>

  <!-- ==================== SETUP VIEW ==================== -->
  <div id="setupView" class="view">
    <div class="card">
      <h3 style="margin-top:0; font-size: 16px; margin-bottom: 16px;">Welcome</h3>
      <p style="font-size: 13px; color: #4b5563; margin-bottom: 20px; line-height: 1.5;">Connect your browser to the Nexora Dashboard to unleash the automation engine.</p>
      
      <button id="autoConnectBtn" class="btn">🔗 Auto-Connect</button>
      <div id="setupMsg" style="text-align: center; font-size: 12px; font-weight: 600; min-height: 20px; color: #4b5563;"></div>

      <div class="divider">or manual sync</div>

      <label>Dashboard URL</label>
      <input type="text" id="dashboardUrl" placeholder="https://your-app.vercel.app">
      
      <label>User ID</label>
      <input type="text" id="userId" placeholder="67baea48-...">
      
      <button id="saveBtn" class="btn btn-outline" style="background: #f9fafb;">Save & Connect</button>
    </div>
  </div>

  <!-- ==================== DASHBOARD VIEW ==================== -->
  <div id="dashboardView" class="view hidden">
    
    <div class="status-card">
      <div class="status-text" id="statusHeader">
        <span class="pulse-dot pulse-red" id="statusDot"></span>
        <span id="statusTitle">Agent Paused</span>
      </div>
      <div class="status-sub" id="statusSub">Ready to automate your engagement</div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="countComments">0/15</div>
        <div class="stat-label">Comments</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="countCycles">0/3</div>
        <div class="stat-label">Cycles Done</div>
      </div>
    </div>

    <div class="keyword-box" id="keywordBox">
      <div class="stat-label" style="margin-bottom: 4px;">🎯 Targeting</div>
      <div class="keyword-text" id="currentKeyword">Waiting for engine...</div>
    </div>

    <button id="playPauseBtn" class="btn btn-success">▶ START ENGINE</button>
    <div id="actionMsg" style="text-align: center; font-size: 12px; font-weight: 600; margin-top: 12px; color: #6b7280; min-height: 20px;"></div>

    <!-- Live Terminal HUD -->
    <div class="terminal-hud" id="terminalHud" style="background: #111827; border-radius: 8px; padding: 12px; margin-top: 12px; border: 1px solid #374151; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);">
      <div style="font-size: 10px; font-weight: 800; color: #4b5563; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; display: flex; align-items: center; gap: 6px;">
        <div style="width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite;"></div>
        Live Process
      </div>
      <div id="liveStatusText" style="font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #10b981; min-height: 36px; display: flex; align-items: center; word-break: break-word; line-height: 1.4;">
        Waiting for next job...
      </div>
    </div>
  </div>

  <footer>
    Need help? <a href="#" id="openDashboardBtn">Open Full Dashboard</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
